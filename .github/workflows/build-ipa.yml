name: 打包无签名IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 打印完整项目结构（排查用）
        run: |
          ls -R
          echo "--- 检查project.pbxproj ---"
          cat Demo.xcodeproj/project.pbxproj | head -50

      - name: 无签名编译.app
        run: |
          xcodebuild -project Demo.xcodeproj \
           -scheme Demo \
           -configuration Release \
           -sdk iphoneos \
           -derivedDataPath build \
           CODE_SIGN_IDENTITY="" \
           CODE_SIGNING_REQUIRED=NO \
           CODE_SIGNING_ALLOWED=NO || exit 1

      - name: 检查编译产物
        run: ls -la build/Build/Products/Release-iphoneos/

      - name: 打包为标准IPA
        run: |
          cd build/Build/Products/Release-iphoneos/
          mkdir -p Payload
          mv *.app Payload/
          zip -r demo.ipa Payload/

      - name: 上传IPA供下载
        uses: actions/upload-artifact@v4
        with:
          name: my-ipa
          path: build/Release-iphoneos/demo.ipa
