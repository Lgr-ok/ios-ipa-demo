name: 打包无签名IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 打印完整项目结构（排查用）
        run: |
          ls -R
          echo "--- 检查project.pbxproj ---"
          cat Demo.xcodeproj/project.pbxproj | head -50

      - name: 无签名编译.app
        run: |
          xcodebuild -project Demo.xcodeproj \
           -scheme Demo \
           -configuration Release \
           -sdk iphoneos \
           -derivedDataPath build \
           CODE_SIGN_IDENTITY="" \
           CODE_SIGNING_REQUIRED=NO \
           CODE_SIGNING_ALLOWED=NO || exit 1

      - name: 检查编译产物
        run: ls -la build/Build/Products/Release-iphoneos/

      - name: 打包为标准IPA
        run: |
          # 进入正确的编译产物目录
          cd build/Build/Products/Release-iphoneos/
          # 检查.app文件是否存在
          if [ ! -d "Demo.app" ]; then
              echo "错误：未找到Demo.app，编译失败！"
              exit 1
          fi
          # 创建Payload目录并移动.app
          mkdir -p Payload
          mv Demo.app Payload/
          # 打包IPA
          zip -r demo.ipa Payload/
          # 清理临时目录
          rm -rf Payload

      - name: 上传IPA供下载
        uses: actions/upload-artifact@v4
        with:
          name: my-ipa
          # 【核心修复】修正为实际生成IPA的完整路径
          path: build/Build/Products/Release-iphoneos/demo.ipa
