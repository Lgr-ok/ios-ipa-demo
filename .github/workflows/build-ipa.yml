name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build iOS App (包含图标资源编译)
      run: |
        xcodebuild -project Demo.xcodeproj \
          -scheme Demo \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          PRODUCT_BUNDLE_IDENTIFIER="com.yourname.Demo" \
          PRODUCT_NAME="Demo" \
          ASSETCATALOG_COMPILER_APPICON_NAME="AppIcon" \
          || exit 1
    
    - name: 验证.app包+图标完整性
      run: |
        APP_PATH="build/Build/Products/Release-iphoneos/Demo.app"
        if [ ! -d "$APP_PATH" ]; then
            echo "❌ Demo.app未生成！"
            exit 1
        fi
        if ls "$APP_PATH"/AppIcon*.png >/dev/null 2>&1; then
            echo "✅ 图标文件已成功打包进.app！"
        else
            echo "⚠️ 图标文件缺失，检查路径/命名！"
        fi
    
    - name: Fix Executable Permissions
      run: |
        APP_PATH="build/Build/Products/Release-iphoneos/Demo.app"
        EXECUTABLE_NAME="Demo"
        chmod +x "$APP_PATH/$EXECUTABLE_NAME"
    
    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -R build/Build/Products/Release-iphoneos/Demo.app Payload/
        zip -r Demo.ipa Payload/
        rm -rf Payload
    
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Demo-IPA
        path: Demo.ipa
