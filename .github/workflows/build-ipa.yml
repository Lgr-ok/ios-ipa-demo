name: 打包无签名IPA
on:
  workflow_dispatch:  # 手动触发打包

jobs:
  build:
    runs-on: macos-latest  # 必须用macOS环境编译iOS项目
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 打印完整项目结构（排查用）
        run: |
          ls -R
          echo "--- 检查project.pbxproj版本和路径 ---"
          cat Demo.xcodeproj/project.pbxproj | grep -E "objectVersion|Info.plist|main.m"

      - name: 无签名编译.app（修复命令格式）
        run: |
          xcodebuild -project Demo.xcodeproj \
                     -scheme Demo \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO || exit 1  # 编译失败直接终止

      - name: 检查编译产物是否存在
        run: |
          # 检查.app文件是否生成
          if [ ! -d "build/Build/Products/Release-iphoneos/Demo.app" ]; then
              echo "错误：编译产物Demo.app不存在！"
              exit 1
          fi
          ls -la build/Build/Products/Release-iphoneos/

      - name: 打包为标准IPA
        run: |
          # 进入正确的编译产物目录
          cd build/Build/Products/Release-iphoneos/
          # 创建Payload目录（iOS IPA必须的结构）
          mkdir -p Payload
          # 移动.app文件到Payload（IPA核心结构）
          mv Demo.app Payload/
          # 打包成IPA文件
          zip -r demo.ipa Payload/
          # 清理临时目录
          rm -rf Payload
          # 打印IPA信息，确认生成成功
          ls -la | grep demo.ipa

      - name: 上传IPA供下载（修复上传路径）
        uses: actions/upload-artifact@v4
        with:
          name: my-ipa  # 下载包的名称
          path: build/Build/Products/Release-iphoneos/demo.ipa  # IPA实际生成路径
          retention-days: 30  # 保留30天，方便下载
