name: Build iOS IPA

on:
  push:
    branches: [ main ]  # 触发分支，可根据你的需求修改
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest  # 必须用macOS环境
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set Xcode version
      run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer  # 匹配你的Xcode版本
    
    - name: Build iOS App
      run: |
        # 编译App（修复BundleID和ProductName）
        xcodebuild -project Demo.xcodeproj \
          -scheme Demo \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          PRODUCT_BUNDLE_IDENTIFIER="com.yourname.Demo" \
          PRODUCT_NAME="Demo"
    
    - name: Fix Executable Permissions (核心修复)
      run: |
        # 找到App包路径
        APP_PATH="build/Build/Products/Release-iphoneos/Demo.app"
        # 获取可执行文件名称
        EXECUTABLE_NAME=$(defaults read "$APP_PATH/Info.plist" CFBundleExecutable)
        # 添加执行权限（解决二进制文件无权限问题）
        chmod +x "$APP_PATH/$EXECUTABLE_NAME"
    
    - name: Package IPA
      run: |
        # 创建IPA打包目录
        mkdir -p Payload
        cp -R build/Build/Products/Release-iphoneos/Demo.app Payload/
        zip -r Demo.ipa Payload/
    
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Demo-IPA
        path: Demo.ipa
